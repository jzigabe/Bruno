info:
  name: auth/signin
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/auth/signin"
  body:
    type: json
    data: |-
      {
        "email": "jos.zigabe@gmail.com",
        "password": "password"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        bru.setEnvVar("token", body.token);

        console.log("Current env:", bru.getEnvName());
        console.log("Saved token:", bru.getEnvVar("token"));

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
